<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" role="img" aria-label="LLM Proxy infrastructure with internal services">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#3c4043"/></marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#1a73e8"/></marker>
    <marker id="arr-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#137333"/></marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#b06000"/></marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="108%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/></filter>
  </defs>

  <text x="640" y="34" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" fill="#202124">LLM Proxy - Full Stack Request Flow</text>
  <text x="640" y="56" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#5f6368">Client - Load Balancer - Spring Boot services (inside each replica) - DO Inference</text>

  <!-- CLIENTS -->
  <rect x="30" y="80" width="130" height="200" rx="8" fill="#f8f9fa" stroke="#dadce0"/>
  <text x="95" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5f6368">CLIENTS</text>
  <rect x="45" y="118" width="100" height="44" rx="6" fill="#fff" stroke="#1a73e8"/>
  <text x="95" y="144" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600">App / curl</text>
  <line x1="160" y1="140" x2="198" y2="140" stroke="#1a73e8" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="179" y="132" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#1a73e8">HTTPS</text>

  <!-- LOAD BALANCER -->
  <rect x="200" y="80" width="130" height="200" rx="8" fill="#e8f4fd" stroke="#1a73e8" stroke-width="2"/>
  <text x="265" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a73e8">EDGE</text>
  <rect x="215" y="118" width="100" height="56" rx="6" fill="#fff" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="265" y="140" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a73e8">Load Balancer</text>
  <text x="265" y="156" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5f6368">health: /healthz</text>
  <line x1="330" y1="140" x2="358" y2="140" stroke="#3c4043" stroke-width="2" marker-end="url(#arr)"/>

  <!-- PROXY INSTANCE DETAIL (the main box) -->
  <rect x="360" y="72" width="560" height="560" rx="10" fill="#e6f4ea" stroke="#137333" stroke-width="2"/>
  <text x="640" y="96" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" font-weight="700" fill="#137333">PROXY INSTANCE (Spring Boot - port 8080)</text>
  <text x="640" y="114" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#5f6368">Instances 2..N are identical copies behind the load balancer</text>

  <!-- API Layer -->
  <rect x="380" y="128" width="520" height="72" rx="8" fill="#e8f4fd" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="400" y="148" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a73e8">API Layer (Controllers)</text>
  <rect x="400" y="158" width="130" height="36" rx="5" fill="#fff" stroke="#1a73e8"/>
  <text x="465" y="174" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">ChatController</text>
  <text x="465" y="186" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">POST /v1/chat</text>
  <rect x="550" y="158" width="130" height="36" rx="5" fill="#fff" stroke="#1a73e8"/>
  <text x="615" y="174" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">MetricsController</text>
  <text x="615" y="186" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">GET /metrics /healthz</text>

  <!-- Arrow LB hits ChatController -->
  <line x1="465" y1="128" x2="465" y2="118" stroke="#3c4043" stroke-width="1.5"/>
  <line x1="465" y1="118" x2="358" y2="118" stroke="#3c4043" stroke-width="1.5"/>
  <line x1="358" y1="118" x2="358" y2="140" stroke="#3c4043" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sync path -->
  <rect x="380" y="218" width="520" height="130" rx="8" fill="#f1f8f4" stroke="#137333" stroke-width="1.5"/>
  <text x="400" y="238" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#137333">Sync Path (HTTP request thread - blocks customer)</text>

  <rect x="400" y="252" width="110" height="40" rx="5" fill="#fff" stroke="#137333"/>
  <text x="455" y="268" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">ProxyService</text>
  <text x="455" y="282" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">handleChat()</text>

  <line x1="465" y1="194" x2="465" y2="218" stroke="#137333" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="510" y1="272" x2="540" y2="272" stroke="#137333" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="542" y="252" width="120" height="40" rx="5" fill="#fff" stroke="#137333"/>
  <text x="602" y="268" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">Primary LlmClient</text>
  <text x="602" y="282" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">WebClient sync</text>

  <line x1="662" y1="272" x2="692" y2="272" stroke="#137333" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="694" y="252" width="90" height="40" rx="5" fill="#fff" stroke="#137333"/>
  <text x="739" y="268" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">HTTP 200</text>
  <text x="739" y="282" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">to client</text>

  <line x1="739" y1="252" x2="739" y2="194" stroke="#137333" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>
  <line x1="739" y1="194" x2="530" y2="194" stroke="#137333" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="530" y1="194" x2="465" y2="194" stroke="#137333" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>

  <!-- Shadow path -->
  <rect x="380" y="366" width="520" height="150" rx="8" fill="#fef7e0" stroke="#b06000" stroke-width="1.5"/>
  <text x="400" y="386" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#b06000">Shadow Path (background shadow-* threads - best effort)</text>

  <path d="M 455 292 L 455 320 L 420 320 L 420 400" stroke="#b06000" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arr-amber)"/>
  <text x="432" y="358" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#b06000">dispatchShadow()</text>

  <rect x="400" y="400" width="115" height="40" rx="5" fill="#fff" stroke="#b06000"/>
  <text x="457" y="416" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600">BoundedShadow</text>
  <text x="457" y="430" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">Executor (pool)</text>

  <line x1="515" y1="420" x2="535" y2="420" stroke="#b06000" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <rect x="537" y="400" width="120" height="40" rx="5" fill="#fff" stroke="#b06000"/>
  <text x="597" y="416" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600">ShadowExecution</text>
  <text x="597" y="430" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">Service</text>

  <line x1="657" y1="420" x2="677" y2="420" stroke="#b06000" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <rect x="679" y="400" width="105" height="40" rx="5" fill="#fff" stroke="#b06000"/>
  <text x="731" y="416" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600">Candidate</text>
  <text x="731" y="430" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">LlmClient</text>

  <line x1="597" y1="440" x2="597" y2="458" stroke="#b06000" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <rect x="537" y="460" width="120" height="40" rx="5" fill="#fff" stroke="#b06000"/>
  <text x="597" y="476" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" font-weight="600">Comparison</text>
  <text x="597" y="490" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#5f6368">Service</text>

  <!-- Metrics store -->
  <rect x="380" y="534" width="520" height="80" rx="8" fill="#e8f4fd" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="400" y="554" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a73e8">Shared State (in-memory per instance)</text>
  <rect x="480" y="564" width="100" height="36" rx="5" fill="#fff" stroke="#1a73e8"/>
  <text x="530" y="586" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="600">MetricsStore</text>

  <line x1="597" y1="500" x2="597" y2="520" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="597" y1="520" x2="530" y2="520" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="530" y1="520" x2="530" y2="564" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-blue)"/>

  <line x1="455" y1="292" x2="480" y2="292" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="480" y1="292" x2="480" y2="550" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="480" y1="550" x2="480" y2="564" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-blue)"/>

  <line x1="615" y1="194" x2="615" y2="534" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="615" y1="534" x2="580" y2="564" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-blue)"/>
  <text x="625" y="380" font-family="Segoe UI, system-ui, sans-serif" font-size="8" fill="#1a73e8">reads metrics</text>

  <!-- DO INFERENCE -->
  <rect x="940" y="80" width="200" height="280" rx="8" fill="#f3e8fd" stroke="#9334e6" stroke-width="2"/>
  <text x="1040" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9334e6">DO INFERENCE</text>
  <rect x="955" y="120" width="170" height="56" rx="6" fill="#fff" stroke="#137333" stroke-width="1.5"/>
  <text x="1040" y="142" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="700" fill="#137333">Primary Model</text>
  <text x="1040" y="158" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5f6368">openai-gpt-oss-20b</text>
  <rect x="955" y="220" width="170" height="56" rx="6" fill="#fff" stroke="#b06000" stroke-width="1.5"/>
  <text x="1040" y="242" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" font-weight="700" fill="#b06000">Candidate Model</text>
  <text x="1040" y="258" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5f6368">deepseek-4-flash</text>

  <line x1="920" y1="272" x2="662" y2="272" stroke="#137333" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="662" y1="272" x2="920" y2="272" stroke="#137333" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="920" y1="420" x2="784" y2="420" stroke="#b06000" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr-amber)"/>
  <line x1="784" y1="420" x2="920" y2="420" stroke="#b06000" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- OBSERVABILITY -->
  <rect x="940" y="380" width="200" height="120" rx="8" fill="#e8f4fd" stroke="#1a73e8" stroke-width="2"/>
  <text x="1040" y="402" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1a73e8">OBSERVABILITY</text>
  <rect x="955" y="416" width="170" height="36" rx="6" fill="#fff" stroke="#1a73e8"/>
  <text x="1040" y="438" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10">Prometheus / Grafana</text>
  <rect x="955" y="460" width="170" height="28" rx="6" fill="#fff" stroke="#1a73e8"/>
  <text x="1040" y="478" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="9">/actuator/prometheus</text>

  <path d="M 955 434 L 900 434 L 900 582 L 580 582" stroke="#1a73e8" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arr-blue)"/>

  <!-- Scale out note -->
  <rect x="360" y="648" width="560" height="48" rx="6" fill="#fff" stroke="#137333"/>
  <text x="640" y="670" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#3c4043">Load balancer fans out to N identical instances - each runs the same controllers and services above</text>
  <text x="640" y="686" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#5f6368">ProxyService, ShadowExecutionService, ComparisonService, MetricsStore all live inside every replica</text>

  <!-- Code map -->
  <rect x="30" y="300" width="300" height="200" rx="8" fill="#fff" stroke="#dadce0"/>
  <text x="180" y="322" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="#202124">Source code map</text>
  <text x="45" y="344" font-family="monospace" font-size="9" fill="#3c4043">controller/ChatController.java</text>
  <text x="45" y="360" font-family="monospace" font-size="9" fill="#3c4043">controller/MetricsController.java</text>
  <text x="45" y="376" font-family="monospace" font-size="9" fill="#3c4043">service/ProxyService.java</text>
  <text x="45" y="392" font-family="monospace" font-size="9" fill="#3c4043">service/ShadowExecutionService.java</text>
  <text x="45" y="408" font-family="monospace" font-size="9" fill="#3c4043">service/ComparisonService.java</text>
  <text x="45" y="424" font-family="monospace" font-size="9" fill="#3c4043">service/MetricsStore.java</text>
  <text x="45" y="440" font-family="monospace" font-size="9" fill="#3c4043">service/BoundedShadowExecutor.java</text>
  <text x="45" y="456" font-family="monospace" font-size="9" fill="#3c4043">client/LlmClient.java (primary + candidate)</text>
  <text x="45" y="480" font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#5f6368">All packaged in one Spring Boot JAR / Docker image</text>

  <!-- Legend -->
  <rect x="30" y="720" width="1220" height="80" rx="8" fill="#fafafa" stroke="#dadce0"/>
  <text x="50" y="744" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="700" fill="#202124">End-to-end flow</text>
  <text x="50" y="764" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#3c4043">1. Client - LB - ChatController  2. ProxyService - Primary LlmClient - DO primary (sync)  3. Response to client</text>
  <text x="50" y="784" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#3c4043">4. ProxyService - BoundedShadowExecutor - ShadowExecutionService - Candidate LlmClient - DO candidate (async)</text>
  <text x="50" y="804" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#3c4043">5. ComparisonService - MetricsStore  6. MetricsController / Prometheus read from MetricsStore</text>
</svg>
