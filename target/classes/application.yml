server:
  port: ${PORT:8080}

spring:
  application:
    name: llm-proxy
  config:
    import: optional:file:.env[.properties]

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

app:
  primary-llm-base-url: ${PRIMARY_LLM_BASE_URL:https://inference.do-ai.run/v1}
  primary-llm-model: ${PRIMARY_LLM_MODEL:llama3.3-70b-instruct}
  primary-llm-api-key: ${PRIMARY_LLM_API_KEY:}
  candidate-llm-base-url: ${CANDIDATE_LLM_BASE_URL:https://inference.do-ai.run/v1}
  candidate-llm-model: ${CANDIDATE_LLM_MODEL:llama3-8b-instruct}
  candidate-llm-api-key: ${CANDIDATE_LLM_API_KEY:}
  mock-llm: ${MOCK_LLM:true}
  llm-timeout-seconds: ${LLM_TIMEOUT_SECONDS:60}
  shadow-core-pool-size: ${SHADOW_CORE_POOL_SIZE:4}
  shadow-max-pool-size: ${SHADOW_MAX_POOL_SIZE:16}
  shadow-queue-capacity: ${SHADOW_QUEUE_CAPACITY:500}
  max-comparison-records: ${MAX_COMPARISON_RECORDS:1000}

logging:
  level:
    com.digitalocean.llmproxy: INFO
